<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back Office &middot; VoiceAgent</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#00ff9d;--green-dim:rgba(0,255,157,0.1);--red:#ff3b5c;--blue:#4af0ff;--bg:#07070f;--panel:#0d0d1a;--border:#1a1a2e;--text:#e0e0f0;--muted:#555570;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,255,157,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,157,0.018) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--panel);border-right:1px solid var(--border);z-index:10;display:flex;flex-direction:column;padding:24px 16px;}
.logo{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;}
.logo span{color:var(--green);}
.logo-sub{font-family:'Space Mono',monospace;font-size:8px;color:#333;letter-spacing:0.2em;margin-bottom:16px;}
.op-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--green-dim);border:1px solid rgba(0,255,157,0.2);border-radius:6px;font-family:'Space Mono',monospace;font-size:9px;color:var(--green);margin-bottom:24px;}
.nav-label{font-family:'Space Mono',monospace;font-size:8px;color:#333;letter-spacing:0.2em;margin-bottom:8px;padding-left:10px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;color:var(--muted);transition:all 0.2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;cursor:pointer;}
.nav-item:hover{background:var(--green-dim);color:#ccc;}
.nav-item.active{background:var(--green-dim);color:var(--green);border-left:2px solid var(--green);}
.sidebar-footer{margin-top:auto;}
.back-link{display:flex;align-items:center;gap:6px;color:#333;text-decoration:none;font-family:'Space Mono',monospace;font-size:9px;padding:8px 12px;border-radius:6px;transition:color 0.2s;margin-bottom:4px;}
.back-link:hover{color:var(--green);}
.logout-btn{display:flex;align-items:center;gap:6px;color:#444;background:none;border:none;font-family:'Space Mono',monospace;font-size:9px;padding:8px 12px;border-radius:6px;cursor:pointer;width:100%;transition:color 0.2s;}
.logout-btn:hover{color:var(--red);}
.main{margin-left:220px;padding:32px;position:relative;z-index:1;}
.view{display:none;}
.view.active{display:block;}
.page-title{font-size:22px;font-weight:600;color:#fff;margin-bottom:4px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:28px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.stat-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.15em;margin-bottom:8px;}
.stat-value{font-size:26px;font-weight:600;color:#fff;}
.stat-value.green{color:var(--green);}
.stat-value.blue{color:var(--blue);}
.stat-value.yellow{color:#ffd700;}
.table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.table-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#0b0b18;}
.table-title{font-family:'Space Mono',monospace;font-size:10px;color:#888;letter-spacing:0.15em;}
.export-btn{padding:6px 14px;background:var(--green-dim);border:1px solid rgba(0,255,157,0.3);border-radius:6px;color:var(--green);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;}
.export-btn:hover{background:rgba(0,255,157,0.2);}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;border-bottom:1px solid var(--border);background:#0c0c18;}
td{padding:11px 16px;font-size:13px;color:#bbb;border-bottom:1px solid #111;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#0f0f1e;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'Space Mono',monospace;font-size:9px;}
.badge.reception{background:rgba(0,255,157,0.1);color:var(--green);}
.badge.support{background:rgba(74,240,255,0.1);color:var(--blue);}
.badge.booking{background:rgba(255,200,0,0.1);color:#ffd700;}
.badge.info{background:rgba(180,100,255,0.1);color:#c080ff;}
.badge.si{background:rgba(0,255,157,0.1);color:var(--green);}
.badge.no{background:rgba(255,59,92,0.08);color:#ff7799;}
.view-btn{padding:4px 10px;background:#111;border:1px solid #222;border-radius:5px;color:#666;font-size:11px;cursor:pointer;transition:all 0.2s;}
.view-btn:hover{border-color:var(--green);color:var(--green);}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:560px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#0c0c18;}
.modal-title{font-family:'Space Mono',monospace;font-size:10px;color:#888;letter-spacing:0.15em;}
.modal-close{background:none;border:none;color:#555;font-size:20px;cursor:pointer;line-height:1;}
.modal-close:hover{color:#fff;}
.modal-body{padding:16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px;}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.chat-msg{display:flex;}
.chat-msg.user{justify-content:flex-end;}
.chat-bubble{max-width:78%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5;}
.chat-msg.user .chat-bubble{background:#0a2218;border:1px solid rgba(0,255,157,0.2);color:#90ffc8;border-radius:10px 10px 2px 10px;}
.chat-msg.assistant .chat-bubble{background:#111;border:1px solid var(--border);color:#ccc;border-radius:10px 10px 10px 2px;}
.chat-who{font-family:'Space Mono',monospace;font-size:8px;color:#444;margin-bottom:3px;}
.chat-msg.user .chat-who{text-align:right;color:rgba(0,255,157,0.4);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">Voice<span>Agent</span></div>
  <div class="logo-sub">BACK OFFICE</div>
  <div class="op-badge">&#9679; OPERATORE ATTIVO</div>
  <div class="nav-label">MENU</div>
  <button class="nav-item active" id="nav-calls" onclick="showView('calls')">&#128203; Storico Chiamate</button>
  <button class="nav-item" id="nav-consents" onclick="showView('consents')">&#128274; Consensi Privacy</button>
  <div class="sidebar-footer">
    <a class="back-link" href="/">&#8592; Torna all'agente</a>
    <button class="logout-btn" onclick="logout()">&#128275; Esci</button>
  </div>
</div>

<div class="main">

  <!-- CHIAMATE -->
  <div class="view active" id="view-calls">
    <div class="page-title">Storico Conversazioni</div>
    <div class="page-sub">Tutte le chiamate registrate in questa sessione del server</div>
    <div class="stats-grid" id="callStats"></div>
    <div class="table-wrap">
      <div class="table-head">
        <div class="table-title">CHIAMATE</div>
        <button class="export-btn" onclick="exportCSV('calls')">&#8595; ESPORTA CSV</button>
      </div>
      <div id="callsTable"></div>
    </div>
  </div>

  <!-- CONSENSI -->
  <div class="view" id="view-consents">
    <div class="page-title">Registro Consensi Privacy</div>
    <div class="page-sub">Registro dei consensi raccolti ai sensi del GDPR (Reg. UE 2016/679)</div>
    <div class="stats-grid" id="consentStats"></div>
    <div class="table-wrap">
      <div class="table-head">
        <div class="table-title">CONSENSI RACCOLTI</div>
        <button class="export-btn" onclick="exportCSV('consents')">&#8595; ESPORTA CSV</button>
      </div>
      <div id="consentsTable"></div>
    </div>
  </div>

</div>

<!-- MODAL DETTAGLIO CHIAMATA -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">DETTAGLIO CHIAMATA</div>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="export-btn" id="modalExportBtn">&#8595; ESPORTA CSV</button>
      <button class="view-btn" onclick="closeModal()">Chiudi</button>
    </div>
  </div>
</div>

<script>
var currentView = 'calls';
var allSessions = [];

function showView(v) {
  currentView = v;
  document.getElementById('view-calls').classList.toggle('active', v==='calls');
  document.getElementById('view-consents').classList.toggle('active', v==='consents');
  document.getElementById('nav-calls').className = 'nav-item' + (v==='calls' ? ' active' : '');
  document.getElementById('nav-consents').className = 'nav-item' + (v==='consents' ? ' active' : '');
  if (v==='calls') loadCalls(); else loadConsents();
}

function logout() {
  fetch('/api/admin/logout', {method:'POST'}).then(function(){window.location.href='/admin';});
}

function stat(label, value, cls) {
  return '<div class="stat-card"><div class="stat-label">'+label+'</div><div class="stat-value '+cls+'">'+value+'</div></div>';
}

function pad(n) { return String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0'); }

function loadCalls() {
  fetch('/api/sessions')
  .then(function(r){if(r.status===401){window.location.href='/admin';throw new Error('unauth');}return r.json();})
  .then(function(sessions){
    allSessions = sessions;
    var total = sessions.length;
    var totalMsgs = sessions.reduce(function(a,s){return a+(s.messages?s.messages.length:0);},0);
    var avgDur = total ? Math.round(sessions.reduce(function(a,s){return a+(s.duration||0);},0)/total) : 0;
    document.getElementById('callStats').innerHTML =
      stat('CHIAMATE', total, 'green') +
      stat('MESSAGGI', totalMsgs, 'blue') +
      stat('DURATA MEDIA', total ? pad(avgDur) : '--', '');
    if (!sessions.length) {
      document.getElementById('callsTable').innerHTML = '<div class="empty-state">Nessuna chiamata registrata.<br>Avvia una chiamata dall\'agente vocale.</div>';
      return;
    }
    var html = '<table><thead><tr><th>#</th><th>TELEFONO</th><th>DATA/ORA</th><th>SCENARIO</th><th>MSG</th><th>DURATA</th><th></th></tr></thead><tbody>';
    sessions.slice().reverse().forEach(function(s,i){
      var d = new Date(s.startedAt);
      var ds = d.toLocaleDateString('it-IT')+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
      var dur = s.duration ? pad(s.duration) : '--';
      html += '<tr>';
      html += '<td style="color:#444;font-family:Space Mono,monospace;font-size:10px">'+(sessions.length-i)+'</td>';
      html += '<td style="font-family:Space Mono,monospace;font-size:11px;color:var(--green)">'+(s.phone||'&mdash;')+'</td>';
      html += '<td style="font-size:12px">'+ds+'</td>';
      html += '<td><span class="badge '+s.scenario+'">'+s.scenario.toUpperCase()+'</span></td>';
      html += '<td>'+(s.messages?s.messages.length:0)+'</td>';
      html += '<td style="font-family:Space Mono,monospace;font-size:12px">'+dur+'</td>';
      html += '<td><button class="view-btn" onclick="openModal(\''+s.id+'\')">Vedi</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('callsTable').innerHTML = html;
  })
  .catch(function(e){if(e.message!=='unauth')console.error(e);});
}

function loadConsents() {
  fetch('/api/consents')
  .then(function(r){if(r.status===401){window.location.href='/admin';throw new Error('unauth');}return r.json();})
  .then(function(list){
    var total = list.length;
    var mkt = list.filter(function(c){return c.consent3;}).length;
    document.getElementById('consentStats').innerHTML =
      stat('REGISTRAZIONI', total, 'green') +
      stat('CONSENSO MARKETING', mkt, 'yellow') +
      stat('TASSO MARKETING', total ? Math.round(mkt/total*100)+'%' : '--', 'blue');
    if (!list.length) {
      document.getElementById('consentsTable').innerHTML = '<div class="empty-state">Nessuna registrazione ancora.</div>';
      return;
    }
    var html = '<table><thead><tr><th>#</th><th>TELEFONO</th><th>DATA/ORA</th><th>SERVIZIO</th><th>ARCHIVIAZIONE</th><th>MARKETING</th></tr></thead><tbody>';
    list.slice().reverse().forEach(function(c,i){
      var d = new Date(c.timestamp);
      var ds = d.toLocaleDateString('it-IT')+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
      html += '<tr>';
      html += '<td style="color:#444;font-family:Space Mono,monospace;font-size:10px">'+(list.length-i)+'</td>';
      html += '<td style="font-family:Space Mono,monospace;font-size:11px;color:var(--green)">'+c.phone+'</td>';
      html += '<td style="font-size:12px">'+ds+'</td>';
      html += '<td><span class="badge si">&#10003; S&Igrave;</span></td>';
      html += '<td><span class="badge si">&#10003; S&Igrave;</span></td>';
      html += '<td><span class="badge '+(c.consent3?'si':'no')+'">'+(c.consent3?'&#10003; S&Igrave;':'&#10007; NO')+'</span></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('consentsTable').innerHTML = html;
  })
  .catch(function(e){if(e.message!=='unauth')console.error(e);});
}

function openModal(id) {
  var s = allSessions.find(function(x){return x.id===id;});
  if (!s) return;
  var d = new Date(s.startedAt);
  document.getElementById('modalTitle').textContent = (s.phone||'—') + ' · ' + d.toLocaleDateString('it-IT') + ' ' + d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}) + ' · ' + s.scenario.toUpperCase();
  var body = document.getElementById('modalBody');
  if (!s.messages || !s.messages.length) {
    body.innerHTML = '<div class="empty-state">Nessun messaggio.</div>';
  } else {
    body.innerHTML = s.messages.map(function(m){
      return '<div class="chat-msg '+m.role+'"><div><div class="chat-who">'+(m.role==='user'?'\u25B2 CLIENTE':'\u25BC AGENTE AI')+'</div><div class="chat-bubble">'+m.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div></div>';
    }).join('');
  }
  document.getElementById('modalExportBtn').onclick = function(){exportSingleCSV(s);};
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function exportCSV(type) {
  fetch('/api/export/csv/'+type)
  .then(function(r){return r.blob();})
  .then(function(blob){
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = type+'.csv';
    a.click();
  });
}

function exportSingleCSV(s) {
  var csv = 'Ruolo,Messaggio,Data\n';
  (s.messages||[]).forEach(function(m){
    csv += '"'+m.role+'","'+m.content.replace(/"/g,'""')+'","'+new Date(s.startedAt).toLocaleString('it-IT')+'"\n';
  });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = 'chiamata_'+s.id+'.csv';
  a.click();
}

// Init
loadCalls();
setInterval(function(){
  if (currentView === 'calls') loadCalls(); else loadConsents();
}, 6000);
</script>
</body>
</html>
